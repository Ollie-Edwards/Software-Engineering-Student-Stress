name: Run Unit Tests
run-name: ${{ github.actor }} is running unit tests
on: [push]

jobs:
  testing:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push to gh-pages branch

    steps:
      # Checkout repository
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed to push new branches

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      # Install dependencies
      - name: Install dependencies
        working-directory: ./Backend
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov httpx
          pip install -r requirements.txt

      # Run tests with coverage
      - name: Run tests with coverage
        working-directory: ./Backend
        run: pytest --cov=app --cov-report=term-missing --cov-report=html:htmlcov

      # Debug: List files to verify htmlcov exists
      - name: List coverage files
        run: |
          echo "Checking Backend/htmlcov directory:"
          ls -la Backend/htmlcov/ || echo "htmlcov directory not found!"
          echo "Checking .gitignore content:"
          cat Backend/htmlcov/.gitignore || echo "No .gitignore found"
          echo "Files in htmlcov:"
          find Backend/htmlcov -type f || echo "No files found!"

      # Upload coverage report as artifact
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Backend/htmlcov/

      # Remove .gitignore from htmlcov to allow deployment
      - name: Remove .gitignore from coverage report
        run: rm -f Backend/htmlcov/.gitignore

      # Deploy coverage to GitHub Pages
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: Backend/htmlcov
          branch: gh-pages
          clean: true
          force: true
