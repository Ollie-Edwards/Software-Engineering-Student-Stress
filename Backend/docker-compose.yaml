services:
  app1:
    build:
      context: .
    container_name: app1
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://myuser:mypass@db:5432/mydb"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8001:8000"
    volumes:
      - .:/Backend

  app2:
    build:
      context: .
    container_name: app2
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://myuser:mypass@db:5432/mydb"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8002:8000"
    volumes:
      - .:/Backend

  app3:
    build:
      context: .
    container_name: app3
    command: sh -c "uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    depends_on:
      - db
    environment:
      DATABASE_URL: "postgresql://myuser:mypass@db:5432/mydb"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 5s
      retries: 5
      start_period: 10s
    ports:
      - "8003:8000"
    volumes:
      - .:/Backend

  nginx:
    image: nginx:alpine
    container_name: nginx
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
      app3:
        condition: service_healthy
    ports:
      - "8000:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf

  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypass
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d

volumes:
  pgdata: